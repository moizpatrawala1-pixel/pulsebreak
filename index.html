<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#07070c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pulsebreak">
    <title>Pulsebreak</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app" aria-label="Pulsebreak game">
      <canvas id="gameCanvas" aria-label="Pulsebreak play field"></canvas>

      <section id="hud" class="hud" aria-live="polite">
        <div class="hud-group">
          <span class="hud-label">Score</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-group">
          <span class="hud-label">Best</span>
          <strong id="bestText">0</strong>
        </div>
        <div class="hud-group compact">
          <span class="hud-label">Pulse</span>
          <div class="energy-track" aria-hidden="true"><span id="energyFill"></span></div>
        </div>
        <button id="pauseBtn" class="icon-button" type="button" aria-label="Pause">II</button>
      </section>

      <section id="menuScreen" class="screen active" aria-label="Main menu">
        <div class="panel menu-panel">
          <div class="brand-row">
            <img src="assets/app-icon.svg" alt="" class="app-mark">
            <div>
              <p class="eyebrow">Offline arcade</p>
              <h1>Pulsebreak</h1>
            </div>
          </div>

          <div class="menu-stats" aria-label="Player stats">
            <div>
              <span>Best</span>
              <strong id="menuBest">0</strong>
            </div>
            <div>
              <span>Coins</span>
              <strong id="coinText">0</strong>
            </div>
            <div>
              <span>Runs</span>
              <strong id="runText">0</strong>
            </div>
          </div>

          <div class="action-stack">
            <button id="playBtn" class="button primary" type="button">Play</button>
            <button id="dailyBtn" class="button secondary" type="button">Daily Run</button>
          </div>

          <div class="menu-block">
            <div class="block-title">Skins</div>
            <div id="skinGrid" class="skin-grid"></div>
          </div>

          <div class="menu-block">
            <div class="block-title">Missions</div>
            <div id="missionList" class="mission-list"></div>
          </div>

          <div class="settings-row">
            <button id="soundBtn" class="toggle-button" type="button">Sound On</button>
            <button id="hapticsBtn" class="toggle-button" type="button">Haptics On</button>
          </div>
        </div>
      </section>

      <section id="pauseScreen" class="screen" aria-label="Paused">
        <div class="panel tight-panel">
          <p class="eyebrow">Paused</p>
          <h2>Hold the line</h2>
          <div class="action-stack">
            <button id="resumeBtn" class="button primary" type="button">Resume</button>
            <button id="pauseMenuBtn" class="button secondary" type="button">Menu</button>
          </div>
        </div>
      </section>

      <section id="gameOverScreen" class="screen" aria-label="Run complete">
        <div class="panel tight-panel">
          <p id="runModeText" class="eyebrow">Run complete</p>
          <h2 id="finalScore">0</h2>
          <div class="result-grid">
            <div><span>Coins</span><strong id="earnedCoins">0</strong></div>
            <div><span>Shards</span><strong id="finalShards">0</strong></div>
            <div><span>Combo</span><strong id="finalCombo">1x</strong></div>
          </div>
          <div class="action-stack">
            <button id="restartBtn" class="button primary" type="button">Run It Back</button>
            <button id="reviveBtn" class="button reward" type="button">Revive</button>
            <button id="gameOverMenuBtn" class="button secondary" type="button">Menu</button>
          </div>
        </div>
      </section>

      <button id="boostBtn" class="boost-button" type="button" aria-label="Trigger pulse boost">
        <span>Boost</span>
      </button>

      <section id="toast" class="toast" aria-live="polite"></section>

      <section id="adModal" class="ad-modal" aria-hidden="true">
        <div class="ad-box" role="dialog" aria-modal="true" aria-labelledby="adTitle">
          <p class="eyebrow">Preview ad</p>
          <h2 id="adTitle">Sponsored break</h2>
          <div class="ad-meter" aria-hidden="true"><span id="adMeterFill"></span></div>
          <button id="adDoneBtn" class="button primary" type="button" disabled>Continue</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
